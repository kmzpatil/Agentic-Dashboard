services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    environment:
      PORT: 4000
      PGHOST: db
      PGPORT: 5432
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      PGPASSWORD: ${POSTGRES_PASSWORD:-TEST}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-TEST}
    ports:
      - "4000:4000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      - api
      - db
    ports:
      - "8080:80"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-TEST}
      POSTGRES_DB: ${POSTGRES_DB:-frammer_database}
    volumes:
      - frammer_db_data:/var/lib/postgresql/data
      - ./database/frammer_data.sql:/docker-entrypoint-initdb.d/01-frammer_data.sql:ro

volumes:
  frammer_db_data:
